<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>CPS Sidebar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <div>
    <div class="sidebar__top">
     
      <div class="sidebar__top-left">
        <button class="icon-btn">
          <img src="img/burger.svg" alt="exit">
        </button>
        <img src="img/logo.svg" alt="logo">
      </div>
      
      
      <button class="icon-btn">
         <img src="img/search.svg" alt="search">
      </button>
    </div>

    <nav class="menu">
      <a href="#">Ремонт техники</a>
      <a href="#">Услуги и сервисы</a>
      <a href="#">Корпоративным клиентам</a>
      <a href="#">Продавцам техники</a>
      <a href="#">Партнерам</a>
      <a href="#">Производителям</a>
      <a href="#">Наши сервисные центры</a>
      <a href="#">Контакты</a>
    </nav>
  </div>

  <div class="sidebar__bottom">
    <div class="sidebar__bottom-icons">
      <button class="icon-btn">
        <img src="img/chatcopy.svg" alt="chatcopy">
      </button>
      <button class="icon-btn">
        <img src="img/chat.svg" alt="chat">
      </button>
      <button class="icon-btn">
        <img src="img/profile.svg" alt="profile">
      </button>
    </div>

    <div class="contacts">
      <div>mail@cps.com</div>
      <div class="phone">8 800 890 8900</div>
    </div>

    <div class="lang">
      <span>RU</span>
      <span>EN</span>
      <span>CH</span>
    </div>
  </div>
</div>

</body>
</html>
